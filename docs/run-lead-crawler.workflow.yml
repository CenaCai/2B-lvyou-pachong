name: Run lead crawler

on:
  workflow_dispatch:
    inputs:
      source_urls:
        description: "Comma-separated authorized URLs to crawl"
        required: true
        type: string
      worksheet_name:
        description: "Google Sheet worksheet/tab name"
        required: true
        default: "leads"
        type: string
      dry_run:
        description: "If true, write CSV artifact instead of Google Sheets"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      GOOGLE_SHEET_ID: "1eUknA5fqniT1KMLdsmqKSrpVXSZW726e3MXvfieOUU8"
      GOOGLE_WORKSHEET_NAME: ${{ inputs.worksheet_name }}
      GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
      SOURCE_URLS: ${{ inputs.source_urls }}
      DRY_RUN: ${{ inputs.dry_run }}
      HEADLESS: "true"
      DEFAULT_SOURCE: "github_actions"
      REQUEST_DELAY_SECONDS: "2"
      MAX_PAGES: "20"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run crawler
        run: python src/main.py

      - name: Upload dry-run CSV
        if: ${{ inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: leads-csv
          path: output/leads.csv
          if-no-files-found: ignore
